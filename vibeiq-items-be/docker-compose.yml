version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:latest
    container_name: items-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=item-catalog
    networks:
      - app-network

  # MongoDB Express web-based admin interface (optional)
  mongo-express:
    image: mongo-express:latest
    container_name: item-catalog-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
