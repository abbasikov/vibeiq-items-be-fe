<div class="form-card">
  <h2>Create New Item</h2>
  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" formControlName="name" />
      <div class="error" *ngIf="itemForm.get('name')?.touched && itemForm.get('name')?.invalid">
        Name is required.
      </div>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description"></textarea>
      <div class="error" *ngIf="itemForm.get('description')?.touched && itemForm.get('description')?.invalid">
        Description is required.
      </div>
    </div>
    <div class="form-group">
      <label for="images">Upload Images</label>
      <input id="images" type="file" (change)="onImageSelected($event)" multiple />
    </div>
    <div class="images" *ngIf="imagePreviews.length > 0">
      <div *ngFor="let img of imagePreviews" class="image-box">
        <img [src]="img.url" />
        <button type="button" (click)="setPrimaryImage(img.id)">
          {{ img.id === primaryImage ? 'Primary' : 'Set as Primary' }}
        </button>
      </div>
    </div>
    <button class="submit-btn" type="submit" [disabled]="itemForm.invalid">Create Item</button>
  </form>
</div>
